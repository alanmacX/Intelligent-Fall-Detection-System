
paths:
  actionclip_weight: "weights/model_best.pt"
  fastvlm_model: "weights/llava-fastvithd_1.5b_stage3/llava-fastvithd_1.5b_stage3"
  lstm_model: "weights/rhythm_lstm.pth"

weights:
  adl_global: 1.0
  fall_global: 1.0
  micro:
    bending: 0.65
    lying: 0.75
    sitting: 0.75
    slow_fall: 1.9
    collapse: 1.2
    motionless: 1.2

thresholds:
  safety_margin: 0.15
  warning_margin: 0.7
  lstm_anomaly: 0.05

api:
  key: "${DEEPSEEK_API_KEY}"
  base_url: "https://api.deepseek.com"
  model: "deepseek-chat"
